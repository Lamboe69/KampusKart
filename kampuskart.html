    @keyframes fadeIn {

    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }

    .delay-400 { animation-delay: 0.4s; }

    .delay-600 { animation-delay: 0.6s; }
    .delay-700 { animation-delay: 0.7s; }
    .delay-800 { animation-delay: 0.8s; }
    .delay-900 { animation-delay: 0.9s; }
    .delay-1000 { animation-delay: 1.0s; }
    .status-pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .status-shipped { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .status-delivered { background: rgba(52, 211, 153, 0.15); color: #34d399; }
    .status-disputed { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .status-completed { background: rgba(52, 211, 153, 0.15); color: #34d399; }

    .line-clamp-2 {
      display: -webkit-box;

    }
    .line-clamp-1 {
      display: -webkit-box;

      -webkit-box-orient: vertical;

    }
    .btn-ripple {
      position: relative;
      overflow: hidden;
    }
    .btn-ripple::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: var(--text-quinary);
      width: 100px;
      height: 100px;
      margin-top: -50px;
      margin-left: -50px;
      top: 50%;
      left: 50%;

    .btn-ripple:active::after {

    @keyframes ripple {

    .card-press { transition: transform 0.15s; }
    .card-press:active { transform: scale(0.98); }
    @keyframes shimmer {

      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--skeleton-from) 25%, var(--skeleton-to) 50%, var(--skeleton-from) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 8px;
    }
    .section-title-underline {
      display: inline-block;

    .section-title-underline::after {
      content: '';

    @keyframes tickerUp {

    .animate-ticker { animation: tickerUp 5s ease-out forwards; }
    @keyframes countdown-pulse {

    .animate-countdown { animation: countdown-pulse 2s ease-in-out infinite; }
    @keyframes float-up {

    :root, [data-theme="dark"] {

      --accent-bg: rgba(245, 158, 11, 0.15);
      --accent-bg-subtle: rgba(245, 158, 11, 0.08);

    [data-theme="light"] {
      --bg-primary: #f3f4f6;
      --bg-elevated: #e5e7eb;
      --bg-card: rgba(0,0,0,0.06);
      --bg-hover: rgba(0,0,0,0.1);
      --bg-hover2: rgba(0,0,0,0.15);
      --bg-nav: rgba(255,255,255,0.9);
      --bg-overlay: rgba(0,0,0,0.35);
      --bg-input: rgba(0,0,0,0.05);
      --text-primary: #0f0f0f;

      --text-quaternary: rgba(0,0,0,0.4);

      --skeleton-from: rgba(0,0,0,0.05);

      --hero-overlay: linear-gradient(to bottom, color-mix(in srgb, var(--bg-primary) 60%, transparent), transparent, var(--bg-primary));
      --grid-color: rgba(0,0,0,0.1);
      --glow-radial: radial-gradient(600px circle at 50% 0%, rgba(0,0,0,0.08), transparent 70%);

      --accent-hover: #92400e;
      --accent-bg: rgba(180, 83, 9, 0.15);

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext } = React;

const API = window.location.origin + '/api';
const TOKEN_KEY = 'kampuskart_token';

const api = {
  async request(path, opts = {}) {
    const token = localStorage.getItem(TOKEN_KEY);
    const headers = { 'Content-Type': 'application/json', ...opts.headers };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`${API}${path}`, { ...opts, headers });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  },
  get(path) { return this.request(path); },
  post(path, body) { return this.request(path, { method: 'POST', body: JSON.stringify(body) }); },
  put(path, body) { return this.request(path, { method: 'PUT', body: JSON.stringify(body) }); },
  del(path) { return this.request(path, { method: 'DELETE' }); },
  async upload(path, formData) {
    const token = localStorage.getItem(TOKEN_KEY);
    const headers = {};
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`${API}${path}`, { method: 'POST', body: formData, headers });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    return data;
  },
};

    const LogoMark = ({ className = "w-8 h-8" }) => (
      <svg className={className} viewBox="0 0 256 256" fill="currentColor">
        <path d="M 0 128 C 70.692 128 128 185.308 128 256 L 64 256 C 64 220.654 35.346 192 0 192 Z M 256 192 C 220.654 192 192 220.654 192 256 L 128 256 C 128 185.308 185.308 128 256 128 Z M 128 0 C 128 70.692 70.692 128 0 128 L 0 64 C 35.346 64 64 35.346 64 0 Z M 192 0 C 192 35.346 220.654 64 256 64 L 256 128 C 185.308 128 128 70.692 128 0 Z" />
      </svg>
    );

    const CATEGORIES = [
      { id: 'all', name: 'All', icon: '🔍' },
      { id: 'electronics', name: 'Electronics', icon: '📱' },
      { id: 'fashion', name: 'Fashion', icon: '👕' },
      { id: 'books', name: 'Books & Notes', icon: '📚' },
      { id: 'food', name: 'Food & Snacks', icon: '🍔' },
      { id: 'beauty', name: 'Beauty', icon: '💄' },
      { id: 'services', name: 'Services', icon: '🔧' },
      { id: 'furniture', name: 'Furniture', icon: '🪑' },
    ];

    const CAMPUSES = [
      { id: 'makerere', name: 'Makerere University', location: 'Kampala' },
      { id: 'kyambogo', name: 'Kyambogo University', location: 'Kampala' },
      { id: 'muk', name: 'Mbarara University', location: 'Mbarara' },
      { id: 'gulu', name: 'Gulu University', location: 'Gulu' },
      { id: 'busitema', name: 'Busitema University', location: 'Busia' },
    ];

    let MOCK_PRODUCTS = [];
let MOCK_SHOPS = [];
let MOCK_ORDERS = [];
let MOCK_WALLET = { balance: 0, pending: 0, totalEarned: 0 };

const IMG_FALLBACK = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22 viewBox=%220 0 400 400%22%3E%3Crect fill=%22%23222%22 width=%22400%22 height=%22400%22/%3E%3Ctext x=%22200%22 y=%22200%22 text-anchor=%22middle%22 dominant-baseline=%22central%22 fill=%22%23666%22 font-size=%2260%22%3E📦%3C/text%3E%3C/svg%3E';
const onImgError = (e) => { e.target.src = IMG_FALLBACK; e.target.onerror = null; };

const normalizeProduct = (p) => ({
  ...p,
  seller: p.sellerName || p.seller_name || p.seller || 'Unknown',
  sellerType: p.sellerType || p.seller_type || 'individual',
  deliveryFee: p.deliveryFee || p.delivery_fee || 0,
  deliveryFees: p.deliveryFees || p.delivery_fees || {},
  originalPrice: p.originalPrice || p.original_price || null,
  reviews: p.reviewsCount || p.reviews_count || p.reviews || 0,
  image: p.image || IMG_FALLBACK,
  description: p.description || '',
  delivery: typeof p.deliveryZones === 'string' ? JSON.parse(p.deliveryZones || '[]') : (typeof p.delivery_zones === 'string' ? JSON.parse(p.delivery_zones || '[]') : (p.delivery || p.deliveryZones || p.delivery_zones || [])),
  badge: p.badge || null,
  verified: p.verified || false,
  condition: p.condition || 'Brand New',
});

const AppContext = createContext();

    const AppProvider = ({ children }) => {
      const [user, setUser] = useState(null);
      const [products, setProducts] = useState([]);
      const [shops, setShops] = useState([]);
      const [orders, setOrders] = useState([]);
      const [wallet, setWallet] = useState({ balance: 0, pending: 0, totalEarned: 0 });
      const [notifications, setNotifications] = useState([]);
      const [currentPage, setCurrentPage] = useState(() => {
        return localStorage.getItem('kampuskart_page') || 'landing';
      });
      const [theme, setTheme] = useState(() => localStorage.getItem('kampuskart_theme') || 'dark');
      const toggleTheme = () => {
        setTheme(prev => {
          const next = prev === 'dark' ? 'light' : 'dark';
          localStorage.setItem('kampuskart_theme', next);
          return next;
        });
      };
      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
      }, [theme]);
      useEffect(() => {
        localStorage.setItem('kampuskart_page', currentPage);
      }, [currentPage]);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [selectedShop, setSelectedShop] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [selectedCampus, setSelectedCampus] = useState('all');
      const [infoTopic, setInfoTopic] = useState('help');
      const [showMobileMenu, setShowMobileMenu] = useState(false);
      const [showAuth, setShowAuth] = useState(false);
      const [showCart, setShowCart] = useState(false);
      const [showNotifications, setShowNotifications] = useState(false);
      const [chatPartner, setChatPartner] = useState(null);
      const [wishlistIds, setWishlistIds] = useState([]);
      const [messageUnread, setMessageUnread] = useState(0);
      const [loading, setLoading] = useState(true);

      const refreshMessageUnread = async () => {
        try {
          const d = await api.get('/messages/conversations');
          const total = (d.conversations || []).reduce((s, c) => s + (c.unread || 0), 0);
          setMessageUnread(total);
        } catch {}
      };

      useEffect(() => {
        const init = async () => {
          setLoading(true);
          try {
            const [prodData, shopData] = await Promise.all([
              api.get('/products').then(d => ({
                products: (d.products || []).map(normalizeProduct)
              })),
              api.get('/shops').then(d => ({
                shops: (d.shops || []).map(s => ({ ...s, reviews: s.reviews || s.reviews_count || 0 }))
              })),
            ]);
            setProducts(prodData.products || prodData);
            setShops(shopData.shops || shopData);
          } catch (e) {
            console.error('Failed to load public data', e);
          }
          const token = localStorage.getItem(TOKEN_KEY);
          if (token) {
            try {
              const [userData, ordersData, walletData, notifData] = await Promise.all([
                api.get('/auth/me'),
                api.get('/orders'),
                api.get('/wallet'),
                api.get('/notifications'),
              ]);
              setUser(userData.user || userData);
              try { const wd = await api.get('/wishlist/ids'); setWishlistIds(wd.ids || []); } catch {}
              setOrders(ordersData.orders || ordersData);
              setWallet(walletData.wallet || walletData);
              setNotifications(notifData.notifications || notifData);
              refreshMessageUnread();
            } catch (e) {
              localStorage.removeItem(TOKEN_KEY);
            }
          }
          setLoading(false);
        };
        init();
      }, []);

      useEffect(() => {
        if (!loading) {
          if (currentPage === 'product' && !selectedProduct) setCurrentPage('home');
          if (currentPage === 'shop-profile' && !selectedShop) setCurrentPage('shops');
        }
      }, [loading, currentPage, selectedProduct, selectedShop]);

      const login = async (email, password) => {
        const data = await api.post('/auth/login', { email, password });
        if (!data || !data.token) throw new Error(data?.error || 'Login failed');
        localStorage.setItem(TOKEN_KEY, data.token);
        setUser(data.user);
        try {
          const [ordersData, walletData, notifData] = await Promise.all([
            api.get('/orders'),
            api.get('/wallet'),
            api.get('/notifications'),
          ]);
          setOrders(ordersData.orders || ordersData);
          setWallet(walletData.wallet || walletData);
          setNotifications(notifData.notifications || notifData);
          refreshMessageUnread();
        } catch (e) { console.error(e); }
        return data;
      };

      const register = async (name, email, password, type, campus) => {
        const data = await api.post('/auth/register', { name, email, password, type, campus });
        if (!data || !data.token) throw new Error(data?.error || 'Registration failed');
        localStorage.setItem(TOKEN_KEY, data.token);
        setUser(data.user);
        try {
          const [ordersData, walletData, notifData] = await Promise.all([
            api.get('/orders'),
            api.get('/wallet'),
            api.get('/notifications'),
          ]);
          setOrders(ordersData.orders || ordersData);
          setWallet(walletData.wallet || walletData);
          setNotifications(notifData.notifications || notifData);
        } catch (e) { console.error(e); }
        return data;
      };

      const logout = () => {
        localStorage.removeItem(TOKEN_KEY);
        setUser(null);
        setOrders([]);
        setWallet({ balance: 0, pending: 0, totalEarned: 0 });
        setNotifications([]);
      };

      const addToCart = (product, qty = 1) => {
        if (!user) { setShowAuth(true); return; }
        setUser(prev => {
          if (!prev) return prev;
          const existing = (prev.cart || []).find(item => (item.product ? item.product.id : item.id) === product.id);
          if (existing) {
            return {
              ...prev,
              cart: prev.cart.map(item =>
                (item.product ? item.product.id : item.id) === product.id
                  ? { ...item, quantity: (item.quantity || 1) + qty }
                  : item
              )
            };
          }
          return { ...prev, cart: [...(prev.cart || []), { product, quantity: qty }] };
        });
      };
      const removeFromCart = (productId) => {
        setUser(prev => prev ? { ...prev, cart: (prev.cart || []).filter(item => {
          const id = item.product ? item.product.id : item.id;
          return id !== productId;
        }) } : prev);
      };
      const updateCartQuantity = (productId, delta) => {
        setUser(prev => {
          if (!prev) return prev;
          const updated = (prev.cart || []).map(item => {
            const id = item.product ? item.product.id : item.id;
            if (id === productId) {
              const newQty = (item.quantity || 1) + delta;
              return newQty <= 0 ? null : { ...item, quantity: newQty };
            }
            return item;
          }).filter(Boolean);
          return { ...prev, cart: updated };
        });
      };
      const clearCart = () => {
        setUser(prev => prev ? { ...prev, cart: [] } : prev);
      };
      const markNotificationRead = async (id) => {
        try {
          await api.put(`/notifications/${id}/read`);
          setNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
        } catch (e) { console.error(e); }
      };
      const markAllNotificationsRead = async () => {
        try {
          await api.put('/notifications/read-all');
          setNotifications(prev => prev.map(n => ({ ...n, read: true })));
        } catch (e) { console.error(e); }
      };

      const refreshOrders = async () => {
        try {
          const data = await api.get('/orders');
          setOrders(data.orders || data);
        } catch (e) { console.error(e); }
      };

      const avatarColors = ['#f44336','#e91e63','#9c27b0','#673ab7','#3f51b5','#2196f3','#009688','#4caf50','#ff9800','#795548'];
      let typingTimer;

      const formatTime = (t) => {
        if (!t) return '';
        const d = new Date(t.replace(' ', 'T') + 'Z');
        const now = new Date();
        const diff = now - d;
        const sameDay = d.toDateString() === now.toDateString();
        const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
        const isYesterday = d.toDateString() === yesterday.toDateString();
        if (sameDay) return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        if (isYesterday) return 'Yesterday ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      };
      const formatDateDivider = (t) => {
        if (!t) return '';
        const d = new Date(t.replace(' ', 'T') + 'Z');
        const now = new Date();
        if (d.toDateString() === now.toDateString()) return 'Today';
        const yesterday = new Date(now); yesterday.setDate(yesterday.getDate()-1);
        if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
        return d.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
      };
      const getAvatarColor = (name) => avatarColors[((name || '').length * 7) % avatarColors.length];
      const isConsecutive = (m, prev) => prev && m.sender_id === prev.sender_id && (new Date(m.created_at) - new Date(prev.created_at)) < 300000;

      useEffect(() => {
        if (!user) return;
        api.get('/messages/conversations').then(d => { setConversations(d.conversations || []); refreshMessageUnread(); }).catch(() => {});
      }, [user]);

      useEffect(() => {
        if (!user || !chatPartner) return;
        api.get(`/messages/${chatPartner.id}`).then(d => {
          setMessages(d.messages || []);
        }).catch(() => {});
        api.get(`/auth/user/${chatPartner.id}`).then(d => {
          setPartnerInfo(d.user || d);
        }).catch(() => setPartnerInfo(chatPartner));

        const token = localStorage.getItem('kampuskart_token');
        const socket = new WebSocket(`ws://${window.location.hostname}:3001?token=${token}`);
        socket.onopen = () => { setWs(socket); };
        socket.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.type === 'new_message' || data.type === 'sent') {
              setMessages(prev => [...prev, data.message]);
              refreshMessageUnread();
            }
            if (data.type === 'typing' && data.user_id === chatPartner.id) {
              setIsTyping(true); clearTimeout(typingTimer); typingTimer = setTimeout(() => setIsTyping(false), 2000);
            }
            if (data.type === 'read_receipt' && data.user_id === chatPartner.id) {
              setMessages(prev => prev.map(m => m.sender_id === user.id ? { ...m, read: 1 } : m));
            }
            if (data.type === 'notification') {
              const n = data.notification;
              alert(`🔔 ${n.type}: ${n.message}`);
            }
          } catch {}
        };
        socket.onclose = () => { setWs(null); };
        return () => { socket.close(); };
      }, [user, chatPartner?.id]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        setShowScrollBtn(false);
      }, [messages]);
      const handleChatScroll = (e) => {
        const el = e.target;
        setShowScrollBtn(el.scrollHeight - el.scrollTop - el.clientHeight > 400);
      };

      const send = () => {
        if (!input.trim() || !ws) return;
        ws.send(JSON.stringify({ receiver_id: chatPartner.id, message: input.trim() }));
        setInput('');
      };
      const sendImage = async (file) => {
        if (!file || !ws) return;
        setUploading(true);
        try {
          const formData = new FormData();
          formData.append('file', file);
          const token = localStorage.getItem(TOKEN_KEY);
          const res = await fetch(`${API}/upload`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
          const data = await res.json();
          ws.send(JSON.stringify({ receiver_id: chatPartner.id, message: '📷 Image', image: data.url }));
        } catch (e) { alert('Upload failed'); }
        setUploading(false);
        setSelectedFile(null);
      };
      const handleInputChange = (e) => {
        setInput(e.target.value);
        if (ws && e.target.value) {
          ws.send(JSON.stringify({ type: 'typing', receiver_id: chatPartner.id }));
        }
      };
      const markRead = () => {
        if (ws && chatPartner) {
          ws.send(JSON.stringify({ type: 'read', receiver_id: chatPartner.id, sender_id: chatPartner.id }));
        }
      };

      const phone = partnerInfo?.phone || chatPartner?.phone || '+256700000000';
      const waLink = `https://wa.me/${phone.replace(/[^0-9]/g, '')}`;
      const telLink = `tel:${phone}`;

      if (!user) {
        return (
          <div className="min-h-screen bg-[var(--bg-primary)] text-[var(--text-primary)] pt-20">
            <div className="w-full px-8 py-8 text-center">
              <div className="text-4xl mb-4">🔒</div>
              <h2 className="text-xl font-semibold mb-2">Sign in required</h2>
              <p className="text-sm text-[var(--text-secondary)] mb-4">Please sign in to message sellers.</p>
              <Button onClick={() => { setShowAuth(true); }}>Sign In</Button>
            </div>
          </div>
        );
      }

      const filtered = conversations.filter(c => (c.other_name || '').toLowerCase().includes(searchConv.toLowerCase()));

      return (
        <div className="h-screen bg-[var(--bg-primary)] text-[var(--text-primary)] flex flex-col">
          <div className="flex-1 flex gap-0 lg:gap-1 overflow-hidden px-2 lg:px-4" style={{ paddingTop: '64px' }}>

            {/* ── LEFT: Conversation List ── */}
            <div className={`${chatPartner ? 'hidden' : 'flex'} lg:flex flex-col w-full lg:w-80 xl:w-96 shrink-0 lg:border-r lg:border-[var(--border-color)] lg:pr-4 overflow-hidden`}>
              <div className="flex items-center justify-between mb-4 shrink-0">
                <div>
                  <SectionEyebrow label="Messages" />
                  <h1 className="text-xl md:text-2xl font-semibold mt-1">Chats</h1>
                </div>
                <span className="text-xs text-[var(--text-tertiary)] bg-[var(--bg-card)] px-2.5 py-1 rounded-full">{conversations.length}</span>
              </div>
              <div className="relative mb-3 shrink-0">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="absolute left-3 top-1/2 -translate-y-1/2 text-[var(--text-quaternary)]"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" value={searchConv} onChange={e => setSearchConv(e.target.value)}
                  placeholder="Search conversations..."
                  className="w-full bg-[var(--bg-card)] border border-[var(--border-color)] rounded-xl pl-9 pr-4 py-2.5 text-sm text-[var(--text-primary)] outline-none focus:border-[var(--border-hover)] placeholder-[var(--text-quaternary)]" />
              </div>
              <div className="flex-1 overflow-y-auto -mx-3 px-3 min-h-0">
                {filtered.length === 0 ? (
                  <div className="flex flex-col items-center justify-center py-16 text-center">
                    <div className="text-5xl mb-4">💬</div>
                    <h3 className="text-lg font-bold mb-2">{conversations.length === 0 ? 'No conversations yet' : 'No matches'}</h3>
                    <p className="text-xs text-[var(--text-secondary)] mb-4">{conversations.length === 0 ? 'Message a seller to start.' : 'Try a different term.'}</p>
                    {conversations.length === 0 && <Button onClick={() => setCurrentPage('home')}>Browse Products</Button>}
                  </div>
                ) : (
                  <div className="flex flex-col gap-0.5">
                    {filtered.map((c, i) => (
                      <div key={c.other_id} onClick={() => setChatPartner({ id: c.other_id, name: c.other_name, phone: c.other_phone || '+256700000000' })}
                        className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all group animate-fade-in-up ${
                          chatPartner?.id === c.other_id ? 'bg-[var(--accent)]/10 border border-[var(--accent)]/20' : 'hover:bg-[var(--bg-hover)]'
                        }`}
                        style={{ animationDelay: `${0.03 * i}s` }}>
                        <div className="relative">
                          <div className="w-11 h-11 rounded-full flex items-center justify-center text-sm font-bold text-white shrink-0"
                            style={{ background: `linear-gradient(135deg, ${getAvatarColor(c.other_name)}, ${getAvatarColor(c.other_name)}88)` }}>
                            {(c.other_name || '?')[0].toUpperCase()}
                          </div>
                          <div className="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-[var(--bg-primary)] bg-[var(--accent)]" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center justify-between">
                            <span className="font-medium text-sm truncate">{c.other_name}</span>
                            <span className="text-[10px] text-[var(--text-tertiary)] shrink-0 ml-2">
                              {c.last_time ? formatTime(c.last_time) : ''}
                            </span>
                          </div>
                          <div className="flex items-center gap-2">
                            <p className="text-xs text-[var(--text-tertiary)] truncate flex-1 leading-relaxed">
                              {c.last_message || 'No messages yet'}

                            {c.unread > 0 && (
                              <span className="px-1.5 py-0.5 rounded-full bg-brand text-white text-[9px] font-bold leading-none shrink-0">{c.unread}</span>
                            )}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* ── RIGHT: Chat Area ── */}
            <div className={`${!chatPartner ? 'hidden' : 'flex'} lg:flex flex-1 flex-col overflow-hidden min-h-0`}>
              {chatPartner ? (
                <div className="liquid-glass rounded-2xl flex flex-col relative flex-1" style={{ minHeight: 0 }}>
                  {/* ── Floating Contact Sheet ── */}
                  {showContact && (
                    <div className="liquid-glass rounded-2xl p-5 mb-4 animate-fade-in-up">
                      <div className="flex items-center gap-4 mb-4">
                        <div className="w-14 h-14 rounded-full flex items-center justify-center text-xl font-bold text-white shrink-0"
                          style={{ background: `linear-gradient(135deg, ${getAvatarColor(partnerInfo?.name || chatPartner?.name)}, ${getAvatarColor(partnerInfo?.name || chatPartner?.name)}88)` }}>
                          {(partnerInfo?.name || chatPartner?.name || '?')[0].toUpperCase()}
                        </div>
                        <div>
                          <div className="font-semibold">{partnerInfo?.name || chatPartner?.name}</div>
                          <div className="text-xs text-[var(--text-secondary)]">{phone}</div>
                          <div className="text-[10px] text-[var(--text-tertiary)] mt-0.5">{ws ? '🟢 Online' : '🔴 Offline'}</div>
                        </div>
                        <button onClick={() => setShowContact(false)} className="ml-auto text-[var(--text-tertiary)] hover:text-[var(--text-primary)]">
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                        </button>
                      </div>
                      <div className="grid grid-cols-3 gap-2">
                        <a href={telLink} className="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-[var(--bg-card)] hover:bg-[var(--bg-hover)] transition-colors text-sm">
                          <span className="text-xl">📞</span>
                          <span className="text-[10px] text-[var(--text-secondary)]">Call</span>
                        </a>
                        <a href={waLink} target="_blank" rel="noopener noreferrer" className="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-[var(--bg-card)] hover:bg-[var(--bg-hover)] transition-colors text-sm">
                          <span className="text-xl">💬</span>
                          <span className="text-[10px] text-[var(--text-secondary)]">WhatsApp</span>
                        </a>
                        <button onClick={() => { navigator.clipboard?.writeText(phone); alert('Phone copied!'); }} className="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-[var(--bg-card)] hover:bg-[var(--bg-hover)] transition-colors text-sm">
                          <span className="text-xl">📋</span>
                          <span className="text-[10px] text-[var(--text-secondary)]">Copy</span>
                        </button>
                      </div>
                    </div>
                  )}

                  {/* ── Chat Header ── */}
                  <div className="flex items-center gap-3 px-4 py-3 border-b border-[var(--border-color)] shrink-0">
                    <button onClick={() => { setChatPartner(null); }} className="w-8 h-8 rounded-full bg-[var(--bg-card)] flex items-center justify-center text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-hover)] transition-all shrink-0 lg:hidden">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <div className="relative cursor-pointer" onClick={() => setShowContact(!showContact)}>
                      <div className="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold text-white shrink-0"
                        style={{ background: `linear-gradient(135deg, ${getAvatarColor(partnerInfo?.name || chatPartner?.name)}, ${getAvatarColor(partnerInfo?.name || chatPartner?.name)}88)` }}>
                        {(partnerInfo?.name || chatPartner?.name || '?')[0].toUpperCase()}
                      </div>
                      <div className={`absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-[var(--bg-elevated)] ${ws ? 'bg-[var(--accent)]' : 'bg-[var(--text-quaternary)]'}`} />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-medium text-sm truncate">{partnerInfo?.name || chatPartner?.name}</div>
                      <div className="text-[10px] text-[var(--text-tertiary)]">
                        {ws ? '🟢 Online' : '🔴 Offline'}
                        {isTyping && <span className="ml-2 text-brand animate-pulse">typing…</span>}
                      </div>
                    </div>
                    <div className="flex items-center gap-1">
                      <a href={telLink} className="w-8 h-8 rounded-full bg-[var(--bg-card)] flex items-center justify-center text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-[var(--bg-hover)] transition-all" title="Call">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                      </a>
                      <a href={waLink} target="_blank" rel="noopener noreferrer" className="w-8 h-8 rounded-full bg-[var(--bg-card)] flex items-center justify-center text-[var(--text-secondary)] hover:text-green-400 hover:bg-green-500/10 transition-all" title="WhatsApp">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
                      </a>
                    </div>
                  </div>

                  {/* ── Messages Area ── */}
                  <div className="flex-1 overflow-y-auto p-4 space-y-1" onClick={() => markRead()} onScroll={handleChatScroll}
                    style={{ backgroundImage: 'radial-gradient(circle at 25% 25%, rgba(var(--accent),0.02) 0%, transparent 50%)' }}>
                    {messages.length === 0 ? (
                      <div className="flex flex-col items-center justify-center h-full text-center">
                        <div className="text-5xl mb-3">👋</div>
                        <p className="text-sm text-[var(--text-tertiary)]">Start a conversation with {partnerInfo?.name || chatPartner?.name}</p>
                      </div>
                    ) : (() => {
                      const groups = [];
                      let lastDate = '';
                      messages.forEach((m, i) => {
                        const dateStr = m.created_at?.split(' ')[0] || '';
                        if (dateStr !== lastDate) {
                          groups.push({ type: 'divider', date: dateStr, label: formatDateDivider(m.created_at) });
                          lastDate = dateStr;
                        }
                        const prev = i > 0 ? messages[i-1] : null;
                        groups.push({ type: 'message', data: m, grouped: isConsecutive(m, prev) });
                      });
                      return groups.map((g, gi) => {
                        if (g.type === 'divider') {
                          return (
                            <div key={`d-${gi}`} className="flex items-center gap-3 py-3">
                              <div className="flex-1 h-px bg-[var(--border-color)]" />
                              <span className="text-[10px] text-[var(--text-quaternary)] font-medium uppercase tracking-wider shrink-0">{g.label}</span>
                              <div className="flex-1 h-px bg-[var(--border-color)]" />
                            </div>
                          );
                        }
                        const m = g.data;
                        return (
                          <div key={m.id} className={`flex items-end gap-2 animate-fade-in-up ${m.sender_id === user.id ? 'justify-end' : 'justify-start'} ${g.grouped ? 'mt-0.5' : 'mt-2'}`}
                            style={{ animationDuration: '0.2s' }}>
                            {m.sender_id !== user.id && !g.grouped && (
                              <div className="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold text-white shrink-0 mb-0.5"
                                style={{ background: `linear-gradient(135deg, ${getAvatarColor(partnerInfo?.name || chatPartner?.name)}, ${getAvatarColor(partnerInfo?.name || chatPartner?.name)}88)` }}>
                                {(partnerInfo?.name || chatPartner?.name || '?')[0].toUpperCase()}
                              </div>
                            )}
                            {m.sender_id !== user.id && g.grouped && <div className="w-7 shrink-0" />}
                            <div className={`relative max-w-[75%] px-3.5 py-2 text-sm leading-relaxed ${
                              m.sender_id === user.id
                                ? 'bg-[var(--accent)] text-white rounded-[18px] rounded-br-[4px]'
                                : 'bg-[var(--bg-card)] text-[var(--text-primary)] rounded-[18px] rounded-bl-[4px]'
                            }`}>
                              {m.image && (
                                <img src={m.image} alt="" className="max-w-full rounded-xl mb-1.5 cursor-pointer hover:opacity-90 transition-opacity"
                                  onClick={(e) => { e.stopPropagation(); setPreviewImage(m.image); }} onError={onImgError} />
                              )}
                              {m.message && <div className="whitespace-pre-wrap break-words">{m.message}</div>}
                              <div className={`flex items-center gap-1 mt-1 ${m.sender_id === user.id ? 'justify-end' : 'justify-start'}`}>
                                <span className={`text-[9px] ${m.sender_id === user.id ? 'text-white/50' : 'text-[var(--text-quaternary)]'}`}>
                                  {m.created_at ? formatTime(m.created_at).split(' ').pop() : ''}

                                  <span className={`text-[9px] ${m.read ? 'text-white/80' : 'text-white/40'}`}>{m.read ? '✓✓' : '✓'}</span>

                            </div>

                    {isTyping && (
                      <div className="flex justify-start items-end gap-2 mt-1 animate-fade-in">
                        <div className="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold text-white shrink-0"
                          style={{ background: `linear-gradient(135deg, ${getAvatarColor(partnerInfo?.name || chatPartner?.name)}, ${getAvatarColor(partnerInfo?.name || chatPartner?.name)}88)` }}>
                          {(partnerInfo?.name || chatPartner?.name || '?')[0].toUpperCase()}
                        </div>
                        <div className="bg-[var(--bg-card)] px-4 py-3 rounded-[18px] rounded-bl-[4px]">
                          <span className="inline-flex gap-1">
                            <span className="w-2 h-2 rounded-full bg-[var(--text-quaternary)] animate-bounce" style={{animationDelay:'0ms'}} />
                            <span className="w-2 h-2 rounded-full bg-[var(--text-quaternary)] animate-bounce" style={{animationDelay:'150ms'}} />
                            <span className="w-2 h-2 rounded-full bg-[var(--text-quaternary)] animate-bounce" style={{animationDelay:'300ms'}} />
                          </span>
                        </div>
                      </div>
                    )}
                    <div ref={messagesEndRef} />
                  </div>

                  {/* ── Scroll to bottom FAB ── */}
                  {showScrollBtn && (
                    <button onClick={() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' })}
                      className="absolute bottom-20 right-6 w-9 h-9 rounded-full bg-[var(--accent)] text-white flex items-center justify-center shadow-lg hover:bg-[var(--accent-hover)] transition-all animate-fade-in z-10">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m6 9 6 6 6-6"/></svg>
                    </button>
                  )}

                  {/* ── Input Area ── */}
                  <div className="border-t border-[var(--border-color)] px-3 py-3 shrink-0">
                    {selectedFile && (
                      <div className="flex items-center gap-2 mb-2 px-1">
                        <div className="w-10 h-10 rounded-xl bg-[var(--bg-card)] overflow-hidden flex-shrink-0">
                          <img src={URL.createObjectURL(selectedFile)} alt="" className="w-full h-full object-cover" />
                        </div>
                        <span className="text-xs text-[var(--text-secondary)] truncate flex-1">{selectedFile.name}</span>
                        <button onClick={() => sendImage(selectedFile)} disabled={uploading}
                          className="text-xs px-3 py-1.5 rounded-full bg-[var(--accent)] text-white hover:bg-[var(--accent-hover)] disabled:opacity-40 transition-all font-medium">
                          {uploading ? 'Uploading...' : 'Send'}
                        </button>
                        <button onClick={() => { setSelectedFile(null); URL.revokeObjectURL(selectedFile); }} className="text-xs text-[var(--text-tertiary)] hover:text-[var(--text-primary)]">✕</button>

      const { user, setShowAuth, setCurrentPage } = useApp();
      const [activeTab, setActiveTab] = useState('verification');
      const [stats, setStats] = useState(null);
      const [verifications, setVerifications] = useState([]);
      const [disputes, setDisputes] = useState([]);
      const [payouts, setPayouts] = useState([]);
      const [listings, setListings] = useState([]);
      const [error, setError] = useState('');

      useEffect(() => {
        if (!user || user.type !== 'admin') return;
        Promise.all([
          api.get('/admin/stats'),
          api.get('/admin/verifications'),
          api.get('/admin/disputes'),
          api.get('/admin/payouts'),
          api.get('/admin/listings'),
        ]).then(([s, v, d, p, l]) => {
          setStats(s);
          setVerifications(v.verifications || []);
          setDisputes(d.disputes || []);
          setPayouts(p.payouts || []);
          setListings(l.listings || []);
        }).catch(err => setError(err.message));
      }, [user]);

      if (!user) {
        return (
          <div className="min-h-screen bg-[var(--bg-primary)] text-[var(--text-primary)] pt-20">
            <div className="w-full px-8 py-8 text-center">

            </div>
          </div>
        );
      }

      if (user.type !== 'admin') {
        return (
          <div className="min-h-screen bg-[var(--bg-primary)] text-[var(--text-primary)] pt-20">

              <Button onClick={() => setCurrentPage('home')}>Go Home</Button>
            </div>
          </div>
        );
      }

      const handleVerification = async (id, status) => {
        try {
          await api.put(`/admin/verifications/${id}`, { status });
          setVerifications(prev => prev.map(v => v.id === id ? { ...v, status } : v));
        } catch (err) { alert(err.message); }
      };

      const handleDispute = async (id, status) => {
        try {
          await api.put(`/admin/disputes/${id}`, { status });
          setDisputes(prev => prev.map(d => d.id === id ? { ...d, status } : d));
        } catch (err) { alert(err.message); }
      };

      const handlePayout = async (id) => {
        try {
          await api.put(`/admin/payouts/${id}`);
          setPayouts(prev => prev.filter(p => p.id !== id));
        } catch (err) { alert(err.message); }
      };

      const handleToggleListing = async (id) => {
        try {
          const res = await api.put(`/admin/listings/${id}/suspend`);
          setListings(prev => prev.map(l => l.id === id ? { ...l, status: res.status } : l));
        } catch (err) { alert(err.message); }

        profile: <ProfilePage />,
        admin: <AdminPanel />,
        info: <InfoPage />,
      };

      return (
        <div className="min-h-screen bg-[var(--bg-primary)] text-[var(--text-primary)] pb-16 md:pb-0">
          <Navbar />
          {loading ? <LoadingSkeletons /> : (pages[currentPage] || <LandingPage />)}
          {showAuth && <LoginModal />}
          <MobileTabBar />
        </div>
      );
    };

    const App = () => (
      <AppProvider>
        <AppShell />
      </AppProvider>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
